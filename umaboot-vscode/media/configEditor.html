<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; img-src {{cspSource}} https: data:;
                   style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}};
                   script-src 'nonce-{{nonce}}';">
    <link href="{{styleUri}}" rel="stylesheet">
    <title>Umaboot Configuration</title>
</head>
<body>
<form id="config-form" novalidate>

    <header class="hdr">
        <h1>Umaboot configuration</h1>
        <div class="view-controls">
            <label for="uiLanguage">Language</label>
            <select id="uiLanguage">
                <option value="en">English</option>
                <option value="id">Indonesia</option>
                <option value="ja">Japanese</option>
            </select>
        </div>
        <div class="status" id="status" aria-live="polite"></div>
    </header>
    <div id="help-panel" class="help-panel hidden" aria-live="polite"></div>

    <section class="block">
        <h2>Connection</h2>
        <div class="row two">
            <div>
                <label for="connectionSource">Source</label>
                <select id="connectionSource">
                    <option value="host">host</option>
                    <option value="url">url</option>
                    <option value="script">script</option>
                </select>
            </div>
            <div>
                <label for="databaseType">Database type</label>
                <select id="databaseType">
                    <option value="postgresql">postgresql</option>
                    <option value="mysql">mysql</option>
                    <option value="mariadb">mariadb</option>
                    <option value="sqlserver">sqlserver</option>
                    <option value="sqlite">sqlite</option>
                </select>
            </div>
        </div>

        <div id="source-host" class="source-fields">
            <div class="row two">
                <div>
                    <label for="connectionHost">Host</label>
                    <input id="connectionHost" type="text" placeholder="localhost:5432">
                </div>
                <div>
                    <label for="connectionDatabase">Database</label>
                    <input id="connectionDatabase" type="text" placeholder="your_db">
                </div>
            </div>
            <div class="row">
                <label for="connectionParams">Parameters</label>
                <input id="connectionParams" type="text" placeholder="sslmode=disable">
            </div>
        </div>

        <div id="source-url" class="source-fields hidden">
            <div class="row">
                <label for="connectionUrl">JDBC URL</label>
                <input id="connectionUrl" type="text" placeholder="jdbc:postgresql://localhost:5432/your_db">
            </div>
        </div>

        <div id="source-script" class="source-fields hidden">
            <div class="row">
                <label for="schemaFile">Schema file</label>
                <div class="input-with-action">
                    <input id="schemaFile" type="text" placeholder="src/main/resources/schema.sql">
                    <button type="button" id="btn-browse-schema" class="ghost">Browse...</button>
                </div>
            </div>
        </div>

        <div id="live-connection-fields">
            <div class="row two">
                <div>
                    <label for="connectionUsername">Username</label>
                    <input id="connectionUsername" type="text" placeholder="postgres">
                </div>
                <div>
                    <label for="connectionPassword">Password</label>
                    <input id="connectionPassword" type="password" placeholder="postgres">
                </div>
            </div>
            <div class="row">
                <label for="connectionSchema">Schema</label>
                <input id="connectionSchema" type="text" placeholder="public">
            </div>
        </div>

        <div class="actions inline">
            <button type="button" id="btn-test-connection" class="ghost">Test Connection</button>
            <button type="button" id="btn-refresh-tables" class="ghost">Refresh Tables</button>
        </div>
        <div id="connection-result" class="hint"></div>
    </section>

    <section class="block">
        <h2>Project</h2>
        <div class="row two">
            <div>
                <label for="architecture">Architecture</label>
                <select id="architecture">
                    <option value="mvc">mvc</option>
                    <option value="hexagonal">hexagonal</option>
                    <option value="ddd">ddd</option>
                </select>
            </div>
            <div>
                <label for="persistence">Persistence</label>
                <select id="persistence">
                    <option value="jpa">jpa</option>
                    <option value="mybatis">mybatis</option>
                    <option value="jooq">jooq</option>
                </select>
            </div>
        </div>
        <div class="row two">
            <div>
                <label for="buildTool">Build tool</label>
                <select id="buildTool">
                    <option value="maven">maven</option>
                    <option value="gradle">gradle</option>
                </select>
            </div>
            <div>
                <label for="mybatisStyle">MyBatis style</label>
                <select id="mybatisStyle">
                    <option value="xml">xml</option>
                    <option value="annotation">annotation</option>
                </select>
            </div>
        </div>
        <label id="useMapStructRow" class="checkbox" data-help-for="useMapStruct">
            <input id="useMapStruct" type="checkbox"> Use MapStruct
        </label>
        <div class="row">
            <label for="basePackage">Base package</label>
            <input id="basePackage" type="text" placeholder="com.example.app">
        </div>
        <div class="row two">
            <div>
                <label for="projectName">Project name</label>
                <input id="projectName" type="text" placeholder="example-app">
            </div>
            <div>
                <label for="projectGroup">Project group</label>
                <input id="projectGroup" type="text" placeholder="com.example">
            </div>
        </div>
        <div class="row two">
            <div>
                <label for="javaVersion">Java version</label>
                <select id="javaVersion">
                    <option value="8">8</option>
                    <option value="11">11</option>
                    <option value="17">17</option>
                    <option value="21">21</option>
                </select>
            </div>
            <div>
                <label for="springBootVersion">Spring Boot version</label>
                <input id="springBootVersion" type="text" placeholder="3.3.5">
            </div>
        </div>
        <label class="checkbox" data-help-for="useLombok">
            <input id="useLombok" type="checkbox"> Use Lombok
        </label>
        <div id="lombokVersionRow" class="grid hidden">
            <div>
                <label for="lombokVersion">Lombok version</label>
                <select id="lombokVersion"></select>
            </div>
        </div>
    </section>

    <section class="block">
        <h2>Code style</h2>
        <div class="grid">
            <div>
                <label for="injectionStyle">Injection</label>
                <select id="injectionStyle">
                    <option value="constructor">constructor</option>
                    <option value="lombok">lombok</option>
                    <option value="autowired">autowired</option>
                </select>
            </div>
            <div>
                <label for="validationStyle">Validation</label>
                <select id="validationStyle">
                    <option value="jakarta">jakarta</option>
                    <option value="none">none</option>
                    <option value="service">service</option>
                </select>
            </div>
            <div>
                <label for="dtoStyle">DTO style</label>
                <select id="dtoStyle">
                    <option value="class">class</option>
                    <option value="record">record</option>
                </select>
            </div>
            <div>
                <label for="dtoShape">DTO shape</label>
                <select id="dtoShape">
                    <option value="separate">separate</option>
                    <option value="single">single</option>
                </select>
            </div>
            <div>
                <label for="exceptionStyle">Exception</label>
                <select id="exceptionStyle">
                    <option value="problemdetail">problemdetail</option>
                    <option value="envelope">envelope</option>
                </select>
            </div>
            <div>
                <label for="openapiStyle">OpenAPI</label>
                <select id="openapiStyle">
                    <option value="yaml">yaml</option>
                    <option value="annotation">annotation</option>
                    <option value="none">none</option>
                </select>
            </div>
            <div>
                <label for="paginationStyle">Pagination</label>
                <select id="paginationStyle">
                    <option value="offset">offset</option>
                    <option value="cursor">cursor</option>
                </select>
            </div>
        </div>
    </section>

    <section class="block">
        <h2>Schema-aware features</h2>
        <label class="checkbox" data-help-for="auditEnabled">
            <input id="auditEnabled" type="checkbox"> Audit fields
        </label>
        <label class="checkbox" data-help-for="softDeleteEnabled">
            <input id="softDeleteEnabled" type="checkbox"> Soft delete
        </label>
    </section>

    <section class="block">
        <h2>Project tooling</h2>
        <label class="checkbox" data-help-for="dockerEnabled">
            <input id="dockerEnabled" type="checkbox"> Emit Dockerfile + docker-compose.yml
        </label>
        <div class="row two">
            <div>
                <label for="ciStyle">CI pipeline</label>
                <select id="ciStyle">
                    <option value="none">none</option>
                    <option value="github">github</option>
                    <option value="gitlab">gitlab</option>
                </select>
            </div>
            <div>
                <label for="migrationsStyle">Migrations</label>
                <select id="migrationsStyle">
                    <option value="none">none</option>
                    <option value="flyway">flyway</option>
                </select>
            </div>
        </div>
        <div class="row two">
            <div>
                <label for="loggingStyle">Logging</label>
                <select id="loggingStyle">
                    <option value="plain">plain</option>
                    <option value="json">json</option>
                </select>
            </div>
            <div>
                <label for="applicationConfigFormat">App config format</label>
                <select id="applicationConfigFormat">
                    <option value="yaml">yaml</option>
                    <option value="properties">properties</option>
                </select>
            </div>
        </div>
        <label class="checkbox" data-help-for="loggingCorrelationId">
            <input id="loggingCorrelationId" type="checkbox"> Add correlation-id filter
        </label>
        <label class="checkbox" data-help-for="testsEnabled">
            <input id="testsEnabled" type="checkbox"> Generate integration tests
        </label>
    </section>

    <section class="block">
        <h2>Security</h2>
        <div class="row">
            <label for="securityStyle">Style</label>
            <select id="securityStyle">
                <option value="none">none</option>
                <option value="basic">basic</option>
                <option value="jwt">jwt</option>
            </select>
        </div>
        <div id="security-jwt" class="hidden">
            <div class="row two">
                <div>
                    <label for="jwtSecret">JWT secret</label>
                    <input id="jwtSecret" type="text" placeholder="externalize via SPRING_SECURITY_JWT_SECRET">
                </div>
                <div>
                    <label for="jwtExpirationMinutes">Expiration minutes</label>
                    <input id="jwtExpirationMinutes" type="number" min="1" value="60">
                </div>
            </div>
        </div>
        <div id="security-users" class="hidden">
            <label for="securityUsers">Users</label>
            <textarea id="securityUsers" rows="3" placeholder="admin:admin:ADMIN,USER&#10;user:user:USER"></textarea>
        </div>
    </section>

    <section class="block">
        <h2>Output</h2>
        <div class="row two">
            <div>
                <label for="outputMode">Mode</label>
                <select id="outputMode">
                    <option value="standalone">standalone</option>
                    <option value="overlay">overlay</option>
                </select>
            </div>
            <div>
                <label for="outputExistingPolicy">Existing output</label>
                <select id="outputExistingPolicy">
                    <option value="warn">warn</option>
                    <option value="overwrite">overwrite</option>
                    <option value="clean">clean</option>
                    <option value="fail">fail</option>
                </select>
            </div>
        </div>
        <div class="row">
            <label class="checkbox" data-help-for="useProjectDirectory">
                <input id="useProjectDirectory" type="checkbox"> Use project directory
            </label>
        </div>
        <div class="row">
            <label for="outputDir">Directory</label>
            <input id="outputDir" type="text" placeholder="leave blank to use the mode default">
        </div>
    </section>

    <section class="block">
        <h2>Tables</h2>
        <div class="row">
            <label for="classNameStripPrefix">Class-name strip prefix</label>
            <input id="classNameStripPrefix" type="text" placeholder="tbl_">
        </div>
        <div class="row">
            <label for="tablesInclude">Include globs</label>
            <textarea id="tablesInclude" rows="3" placeholder="customer*&#10;order*"></textarea>
        </div>
        <div class="row">
            <label for="tablesExclude">Exclude globs</label>
            <textarea id="tablesExclude" rows="3" placeholder="audit_*&#10;flyway_schema_history"></textarea>
        </div>
        <div class="actions inline">
            <button type="button" id="btn-customize-tables" class="ghost">Customize Tables</button>
        </div>
        <div id="table-editor" class="table-editor hidden">
            <div class="table-list" id="table-editor-list" aria-label="Tables"></div>
            <div class="table-detail">
                <div class="table-detail-header">
                    <div>
                        <h3 id="table-editor-title">Table</h3>
                        <div id="table-editor-default" class="hint"></div>
                    </div>
                    <button type="button" id="btn-clear-table-override" class="ghost">Clear Override</button>
                </div>
                <div class="row">
                    <label for="tableOverrideClassName">Class name override</label>
                    <input id="tableOverrideClassName" type="text" placeholder="AccountUser">
                </div>
                <div class="column-editor" id="column-editor"></div>
            </div>
        </div>
        <div class="row">
            <label for="tableOverrides">Table overrides (JSON)</label>
            <textarea id="tableOverrides" rows="8" placeholder="{&#10;  &quot;users&quot;: {&#10;    &quot;className&quot;: &quot;AccountUser&quot;,&#10;    &quot;columns&quot;: {&#10;      &quot;id&quot;: { &quot;javaType&quot;: &quot;java.util.UUID&quot; }&#10;    }&#10;  }&#10;}"></textarea>
        </div>
    </section>

    <footer class="footer">
        <button type="button" id="btn-revert" class="ghost">Revert</button>
        <button type="button" id="btn-sync-yaml" class="ghost">Sync from YAML</button>
        <button type="submit" id="btn-save" class="primary">Save</button>
    </footer>

</form>
<script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
